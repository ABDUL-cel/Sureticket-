<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Event - SureTicket</title>
  <link rel="stylesheet" href="create-event.css">
</head>
<body>
  <header>
    <h1>SureTicket</h1>
    <p>Your Ticket. Sure.</p>
  </header>

  <div class="container">
    <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
    
    <h2>Create New Event</h2>

    <form class="event-form">
      <div class="form-group">
        <label>Event Name *</label>
        <input type="text" placeholder="e.g. Afrobeats Night 2026" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Date *</label>
          <input type="date" required>
        </div>
        <div class="form-group">
          <label>Time *</label>
          <input type="time" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>State *</label>
          <select required>
            <option value="">Select State</option>
            <option>Lagos</option>
            <option>Abuja FCT</option>
            <option>Rivers</option>
            <option>Kano</option>
            <option>Oyo</option>
            <!-- Add all 36 states later -->
          </select>
        </div>
        <div class="form-group">
          <label>City *</label>
          <input type="text" placeholder="e.g. Ikeja, Wuse, PH" required>
        </div>
      </div>

      <div class="form-group">
        <label>Venue *</label>
        <input type="text" placeholder="e.g. Eko Convention Centre" required>
      </div>

      <div class="form-group">
        <label>Event Description</label>
        <textarea rows="4" placeholder="Tell people about your event"></textarea>
      </div>

      <div class="form-group">
        <label>Upload Flyer</label>
        <input type="file" accept="image/*">
      </div>

      <h3>Ticket Types ₦</h3>
      <div class="ticket-row">
        <input type="text" placeholder="Ticket Name e.g. Regular">
        <input type="number" placeholder="Price ₦ e.g. 5000">
        <input type="number" placeholder="Quantity">
      </div>
      <div class="ticket-row">
        <input type="text" placeholder="Ticket Name e.g. VIP">
        <input type="number" placeholder="Price ₦ e.g. 20000">
        <input type="number" placeholder="Quantity">
      </div>

      <button type="submit" class="btn-submit">Publish Event</button>
    </form>
  </div>
</body>
</html>
