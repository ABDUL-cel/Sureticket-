<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SureTicket Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>SureTicket</h1>
    <p>Your Ticket. Sure.</p>
  </header>

  <div class="container">
    <div class="top-bar">
      <h2>Dashboard</h2>
      <button class="btn"><a href="Create-event.html">+ Create New Event</a></button>
    </div>

    <div class="stats">
      <div class="card">
        <p>Total Revenue</p>
        <h3>₦1,275,000</h3>
      </div>
      <div class="card">
        <p>Tickets Sold</p>
        <h3>165</h3>
      </div>
      <div class="card">
        <p>Upcoming Events</p>
        <h3>2</h3>
      </div>
    </div>

    <div class="table-box">
      <h3>My Events</h3>
      <table>
        <thead>
          <tr>
            <th>Event</th><th>Date</th><th>Location</th><th>Sold</th><th>Revenue</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Afrobeats Night</td><td>Apr 26</td><td>Abuja, FCT</td><td>120</td><td>₦600,000</td>
          </tr>
          <tr>
            <td>Tech Summit</td><td>May 10</td><td>Lagos, Lagos</td><td>45</td><td>₦675,000</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
